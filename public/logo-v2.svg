<svg width="215" height="36" viewBox="0 0 215 36" xmlns="http://www.w3.org/2000/svg">
  <!-- Knockout bracket: 4 teams → 2 semi-final winners → champion -->
  <!-- Round 1, Match A: teams at y=4 and y=13 -->
  <line x1="0"  y1="4"  x2="14" y2="4"  stroke="#f0a500" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>
  <line x1="0"  y1="13" x2="14" y2="13" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>
  <line x1="14" y1="4"  x2="14" y2="13" stroke="#f0a500" stroke-width="2"   stroke-linecap="round" opacity="0.28"/>
  <line x1="14" y1="8.5" x2="26" y2="8.5" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Round 1, Match B: teams at y=23 and y=32 -->
  <line x1="0"  y1="23" x2="14" y2="23" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>
  <line x1="0"  y1="32" x2="14" y2="32" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round" opacity="0.28"/>
  <line x1="14" y1="23" x2="14" y2="32" stroke="#f0a500" stroke-width="2"   stroke-linecap="round" opacity="0.28"/>
  <line x1="14" y1="27.5" x2="26" y2="27.5" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Final: winners converge -->
  <line x1="26" y1="8.5"  x2="26" y2="27.5" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="18"   x2="36" y2="18"   stroke="#f0a500" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Champion dot -->
  <circle cx="37" cy="18" r="3.5" fill="#f0a500"/>
  <!-- Wordmark -->
  <text x="49" y="27" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-weight="700" font-size="28" fill="#f0a500" letter-spacing="1.5">FIXTURDAY</text>
</svg>
